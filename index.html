<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="book-entry">
            <form>
                <div>
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter book title" required>
                </div>
                <div>
                    <label for="author">Author</label>
                    <input type="text" id="author" name="author" placeholder="Enter author" required>
                </div>
                <div>
                    <label for="pages">pages</label>
                    <input type="number" id="pages" name="pages" placeholder="Enter page amount" required>
                </div>
                <div>
                    <label for="datePublished">Date Published</label>
                    <input type="date" id="datePublished" name="datePublished" required>
                </div>
                <button type="button" id="addBookBtn">Add Book</button>
            </form>
            <div class="message-box">
            </div>
        </div>
        <div class="book-display">

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
